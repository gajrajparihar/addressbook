name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

env:
  ECR_REPOSITORY: addressbook

permissions:
  contents: read

jobs:
  build_upload_war:
    environment: Dev

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn clean package

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        # Build a docker container and
        # push it to ECR so that it can be deployed to ECS.
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> $GITHUB_OUTPUT

    - name: Remove untagged images from ECR
      run: |
        UNTAGGED_DIGESTS=$(aws ecr list-images \
          --repository-name "$ECR_REPOSITORY" \
          --filter tagStatus=UNTAGGED \
          --query 'imageIds[*].imageDigest' \
          --output text)

        if [ -z "$UNTAGGED_DIGESTS" ] || [ "$UNTAGGED_DIGESTS" = "None" ]; then
          echo "No untagged images found in $ECR_REPOSITORY"
          exit 0
        fi

        for digest in $UNTAGGED_DIGESTS; do
          aws ecr batch-delete-image \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageDigest="$digest"
        done

