name: Deploy AddressBook

on:
  workflow_dispatch:

jobs:
  deploy:
    environment: Dev

    runs-on: ubuntu-latest

    steps:

      - name: Checkout AddressBook Repository
        uses: actions/checkout@v4

      - name: Checkout Ansible Repository
        uses: actions/checkout@v4
        with:
          repository: gajrajparihar/ansible-project     
          path: ansible-project
          token: ${{ secrets.ANSIBLE_REPO_TOKEN }}

      - name: Set up Python virtualenv for Ansible
        run: |
          python3 -m pip install --upgrade pip
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install ansible boto3 botocore

      - name: Install Ansible Collections
        run: |
          . .venv/bin/activate
          ansible-galaxy collection install amazon.aws

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY_TERRAFORM_ANSIBLE_PEM }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat <<EOF >> ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Execute Ansible Playbook
        working-directory: ansible-project/ansible
        env:
          S3_BUCKET_WAR: ${{ vars.S3_BUCKET_WAR }}
          APP_VERSION: ${{ vars.APP_VERSION }}
        run: |
            . ../../.venv/bin/activate
            ansible-playbook -l app \
            playbooks/tomcat_install.yml \
            playbooks/deploy_war.yml \
            --private-key ~/.ssh/id_rsa \
            --extra-vars "s3_bucket=$S3_BUCKET_WAR app_version=$APP_VERSION"