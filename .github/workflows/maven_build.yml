name: Build and upload WAR to S3

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_upload_war:
    environment: Dev

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn clean package

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Upload WAR to S3
      run: aws s3 cp target/addressbook-2.1.war \
          s3://${{ env.S3_BUCKET_WAR }}/addressbook/addressbook-${{ github.run_number }}.war

    - name: Show uploaded files
      run: aws s3 ls s3://${{  env.S3_BUCKET_WAR }}/addressbook/